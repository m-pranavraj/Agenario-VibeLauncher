version: "3.9"

# Agenario Local Development Stack
# Phase 7.1 — Docker Compose for zero-config local development
# Usage:
#   docker-compose up -d        # Start all services
#   docker-compose down -v      # Stop and remove volumes
#   docker-compose logs -f api  # Follow api logs

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: agenario_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: agenario
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: agenario_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docs/migration-v2.sql:/docker-entrypoint-initdb.d/01_migration.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agenario -d agenario_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
    container_name: agenario_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://agenario:devpassword@postgres:5432/agenario_dev
      SESSION_SECRET: local-dev-secret-change-in-prod
      FRONTEND_URL: http://localhost:5173
      # Add your own API keys in .env.local:
      # GROQ_API_KEY: ...
      # OPENAI_API_KEY: ...
      # RAZORPAY_KEY_ID: ...
      # RAZORPAY_KEY_SECRET: ...
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /tmp/agenario-scans:/tmp/agenario-scans
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Frontend (Vite dev server) ─────────────────────────────────────────────
  frontend:
    build:
      context: ./artifacts/agenario
      dockerfile: Dockerfile.dev
    container_name: agenario_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8080
    volumes:
      - ./artifacts/agenario/src:/app/src:ro
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: agenario_net
